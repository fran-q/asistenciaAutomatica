<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Asistencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-clipboard-check"></i>
            <span class="sidebar-title">Asistencia</span>
        </div>
        <ul class="sidebar-nav">
            <li class="nav-item active" data-page="dashboard">
                <i class="bi bi-grid-1x2"></i><span>Dashboard</span>
            </li>
            <li class="nav-section">Personas</li>
            <li class="nav-item" data-page="usuarios">
                <i class="bi bi-people"></i><span>Usuarios</span>
            </li>
            <li class="nav-item" data-page="profesores">
                <i class="bi bi-person-badge"></i><span>Profesores</span>
            </li>
            <li class="nav-item" data-page="alumnos">
                <i class="bi bi-mortarboard"></i><span>Alumnos</span>
            </li>
            <li class="nav-section">Academico</li>
            <li class="nav-item" data-page="instituciones">
                <i class="bi bi-building"></i><span>Instituciones</span>
            </li>
            <li class="nav-item" data-page="carreras">
                <i class="bi bi-journal-bookmark"></i><span>Carreras</span>
            </li>
            <li class="nav-item" data-page="cursos">
                <i class="bi bi-collection"></i><span>Cursos</span>
            </li>
            <li class="nav-item" data-page="materias">
                <i class="bi bi-book"></i><span>Materias</span>
            </li>
            <li class="nav-item" data-page="curso-materias">
                <i class="bi bi-link-45deg"></i><span>Curso-Materia</span>
            </li>
            <li class="nav-section">Gestion</li>
            <li class="nav-item" data-page="asignaciones">
                <i class="bi bi-diagram-3"></i><span>Asignaciones</span>
            </li>
            <li class="nav-item" data-page="horarios">
                <i class="bi bi-clock"></i><span>Horarios</span>
            </li>
            <li class="nav-item" data-page="asistencias">
                <i class="bi bi-calendar-check"></i><span>Asistencias</span>
            </li>
            <li class="nav-item" data-page="inscripciones">
                <i class="bi bi-pencil-square"></i><span>Inscripciones</span>
            </li>
            <li class="nav-item" data-page="notificaciones">
                <i class="bi bi-bell"></i><span>Notificaciones</span>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button id="sidebar-toggle" class="btn-icon" title="Toggle sidebar">
                    <i class="bi bi-list"></i>
                </button>
                <nav id="breadcrumb" class="breadcrumb-nav">
                    <span class="breadcrumb-item">Dashboard</span>
                </nav>
            </div>
            <div class="topbar-right">
                <button id="theme-toggle" class="btn-icon" title="Cambiar tema">
                    <i class="bi bi-moon-stars"></i>
                </button>
            </div>
        </header>

        <!-- Page Content -->
        <div id="page-content" class="page-content">
            <!-- Dynamic content loaded here -->
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal Template -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div id="modal-box" class="modal-box">
            <div class="modal-header">
                <h5 id="modal-title"></h5>
                <button class="btn-icon modal-close"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer">
                <button class="btn btn-secondary modal-close">Cancelar</button>
                <button id="modal-save" class="btn btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirm-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-box modal-sm">
            <div class="modal-header">
                <h5 id="confirm-title">Confirmar</h5>
                <button class="btn-icon confirm-close"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="confirm-body" class="modal-body">
                <p id="confirm-message"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary confirm-close">Cancelar</button>
                <button id="confirm-ok" class="btn btn-danger">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils/api.js"></script>
    <script src="js/utils/ui.js"></script>
    <script src="js/utils/crud.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/usuarios.js"></script>
    <script src="js/pages/profesores.js"></script>
    <script src="js/pages/alumnos.js"></script>
    <script src="js/pages/instituciones.js"></script>
    <script src="js/pages/carreras.js"></script>
    <script src="js/pages/cursos.js"></script>
    <script src="js/pages/materias.js"></script>
    <script src="js/pages/curso-materias.js"></script>
    <script src="js/pages/asignaciones.js"></script>
    <script src="js/pages/horarios.js"></script>
    <script src="js/pages/asistencias.js"></script>
    <script src="js/pages/inscripciones.js"></script>
    <script src="js/pages/notificaciones.js"></script>
</body>
</html>
